version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: controlei-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-controlei}
      POSTGRES_USER: ${DB_USER:-controlei}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-controlei123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-controlei} -d ${DB_NAME:-controlei}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
