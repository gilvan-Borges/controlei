@if (isMobile) {
  <div class="mobile-shell">
    <header class="mobile-header bg-primary text-white text-center py-2">
      <div class="d-flex justify-content-between align-items-center px-3">
        <h5 class="mb-0 fw-bold">Controlei</h5>
        <button class="btn btn-sm btn-outline-light" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </header>

    <main class="mobile-content">
      <router-outlet></router-outlet>
    </main>

    <nav class="bottom-nav">
      @for (item of navItems; track item.route) {
        <a
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route === '/app/dashboard' }"
        >
          <i class="bi" [ngClass]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </div>
} @else {
  <div class="desktop-shell d-flex">
    <aside class="sidebar bg-dark text-white">
      <div class="sidebar-header p-3 border-bottom border-secondary">
        <h5 class="mb-0 fw-bold">Controlei</h5>
      </div>
      <nav class="sidebar-nav p-2">
        @for (item of navItems; track item.route) {
          <a
            class="nav-link text-white d-flex align-items-center gap-2 py-2 px-3 rounded mb-1"
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.route === '/app/dashboard' }"
          >
            <i class="bi" [ngClass]="item.icon"></i>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>
      <div class="p-3 mt-auto">
        <button class="btn btn-sm btn-outline-light w-100" (click)="logout()">
          <i class="bi bi-box-arrow-right me-1"></i> Sair
        </button>
      </div>
    </aside>

    <main class="desktop-content flex-fill bg-light">
      <router-outlet></router-outlet>
    </main>
  </div>
}
