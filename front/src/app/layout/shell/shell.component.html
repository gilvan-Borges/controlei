@if (isMobile) {
  <div class="app-shell app-shell-mobile">

    <header class="mobile-topbar">
      <div>
        <span class="eyebrow">online</span>
        <h5>Controlei</h5>
      </div>
      <div style="display:flex;align-items:center;gap:0.4rem;">
        <button class="icon-action" type="button" aria-label="Alternar tema" (click)="toggleTheme()">
          <i class="bi" [ngClass]="isDark ? 'bi-sun-fill' : 'bi-moon-fill'"></i>
        </button>
        <button class="icon-action" type="button" aria-label="Sair" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </header>

    <main class="mobile-content">
      <router-outlet></router-outlet>
    </main>

    <nav class="bottom-nav" aria-label="Navegacao principal">
      @for (item of mobileNavItems; track item.route) {
        <a
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route === '/app/dashboard' }"
        >
          <i class="bi" [ngClass]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </div>
} @else {
  <div class="app-shell app-shell-desktop">

    <aside class="sidebar">
      <div class="brand-block">
        <div class="brand-mark">
          <i class="bi bi-stars"></i>
        </div>
        <div>
          <span class="eyebrow">finance os</span>
          <h5>Controlei</h5>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Navegacao principal">
        @for (item of navItems; track item.route) {
          <a
            class="nav-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.route === '/app/dashboard' }"
          >
            <i class="bi" [ngClass]="item.icon"></i>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>

      <div class="sidebar-footer">
        <div class="status-card">
          <i class="bi bi-shield-check"></i>
          <div>
            <strong>Ambiente seguro</strong>
            <span>JWT ativo</span>
          </div>
        </div>
        <button class="theme-toggle" type="button" (click)="toggleTheme()" aria-label="Alternar tema">
          <i class="bi" [ngClass]="isDark ? 'bi-sun-fill' : 'bi-moon-fill'"></i>
          <span>{{ isDark ? 'Modo claro' : 'Modo escuro' }}</span>
        </button>
        <button class="btn btn-outline-light w-100" type="button" (click)="logout()">
          <i class="bi bi-box-arrow-right me-2"></i>
          Sair
        </button>
      </div>
    </aside>

    <main class="desktop-content">
      <router-outlet></router-outlet>
    </main>
  </div>
}
