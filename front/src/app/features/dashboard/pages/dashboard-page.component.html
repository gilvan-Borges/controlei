<div class="container py-3">
  <h4 class="mb-3">Dashboard</h4>
  <p class="text-muted mb-4">{{ currentMonth }}</p>

  <div class="row g-3">
    <div class="col-6">
      <div class="card">
        <div class="card-body text-center">
          <small class="text-muted">Saldo</small>
          <h5 class="mb-0 text-success">R$ 0,00</h5>
        </div>
      </div>
    </div>
    <div class="col-6">
      <div class="card">
        <div class="card-body text-center">
          <small class="text-muted">Receitas</small>
          <h5 class="mb-0 text-primary">R$ 0,00</h5>
        </div>
      </div>
    </div>
    <div class="col-6">
      <div class="card">
        <div class="card-body text-center">
          <small class="text-muted">Despesas</small>
          <h5 class="mb-0 text-danger">R$ 0,00</h5>
        </div>
      </div>
    </div>
    <div class="col-6">
      <div class="card">
        <div class="card-body text-center">
          <small class="text-muted">Dívidas</small>
          <h5 class="mb-0 text-warning">R$ 0,00</h5>
        </div>
      </div>
    </div>
  </div>

  <div class="card mt-4">
    <div class="card-body text-center py-5">
      <i class="bi bi-inbox" style="font-size: 2rem; color: #ccc;"></i>
      <p class="text-muted mt-2 mb-0">Nenhuma transação registrada.</p>
    </div>
  </div>
</div>
