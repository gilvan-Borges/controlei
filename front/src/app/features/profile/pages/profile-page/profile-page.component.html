<div class="container-fluid px-0">
  <h5 class="mb-3">Meu Perfil</h5>

  @if (loading) {
    <app-loading message="Carregando perfil..."></app-loading>
  }

  @if (errorMessage && !loading) {
    <app-error-message [message]="errorMessage"></app-error-message>
  }

  @if (user && !loading) {
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex align-items-center mb-3">
          <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
            <i class="bi bi-person fs-4"></i>
          </div>
          <div class="ms-3">
            <h6 class="mb-0">{{ user.name }}</h6>
            <small class="text-muted">{{ user.email }}</small>
          </div>
        </div>

        <div class="row g-3">
          <div class="col-6">
            <small class="text-muted d-block">Papel</small>
            <span class="badge" [class.bg-primary]="user.role === 'RESPONSIBLE'" [class.bg-secondary]="user.role === 'MEMBER'">
              {{ roleLabel }}
            </span>
          </div>
          <div class="col-6">
            <small class="text-muted d-block">Status</small>
            <span class="badge" [class.bg-success]="user.active" [class.bg-danger]="!user.active">
              {{ user.active ? 'Ativo' : 'Inativo' }}
            </span>
          </div>
        </div>
      </div>
    </div>

    @if (family) {
      <div class="card">
        <div class="card-body">
          <h6 class="card-title mb-3">
            <i class="bi bi-people me-2"></i>Família
          </h6>
          <div>
            <small class="text-muted d-block">Nome</small>
            <span>{{ family.name }}</span>
          </div>
        </div>
      </div>
    }
  }
</div>
