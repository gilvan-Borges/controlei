
server.port=8080
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:controlei}
spring.datasource.username=${DB_USER:controlei}
spring.datasource.password=${DB_PASSWORD:controlei123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.validate-on-migrate=true

logging.level.br.com.controlei=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

app.seed.enabled=true
app.seed.family-name=Familia Borges
app.seed.super-admin-name=Super Admin
app.seed.super-admin-email=superadmin@controlei.local
app.seed.super-admin-password=Controlei@123
app.seed.member-name=Gilvan Borges
app.seed.member-email=gilvan.borges@controlei.local
app.seed.member-password=Controlei@123
