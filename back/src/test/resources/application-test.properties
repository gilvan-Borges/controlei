spring.datasource.url=jdbc:h2:mem:controlei_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/test
spring.flyway.validate-on-migrate=true

jwt.secret=test-secret-must-be-at-least-256-bits-long-for-hs256
jwt.expiration-hours=24

logging.level.br.com.controlei=INFO
